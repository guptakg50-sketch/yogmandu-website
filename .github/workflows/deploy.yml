name: Deploy to cPanel

# Push to master → build the Next.js standalone bundle and upload it to the
# cPanel host over WebDAV (Web Disk, HTTPS port 2078). A cPanel cron job on
# the server then extracts it and restarts the app. HTTPS is used end-to-end
# because this host firewalls FTP passive ports and kills SSH/SFTP sessions —
# but it cannot block its own HTTPS control plane.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   WEBDISK_URL   e.g. https://yogmandu.com:2078   (Web Disk root = yogmandu-next)
#   WEBDISK_USER  the Web Disk account username (e.g. deploy@yogmandu.com)
#   WEBDISK_PASS  that account's password
on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: cpanel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build standalone bundle
        run: npm run build

      - name: Assemble standalone (static + public + restart.txt)
        run: node scripts/assemble-standalone.mjs
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Package (exclude server-owned app.js/.env)
        run: tar -czf /tmp/build.tar.gz --exclude=./app.js --exclude=./.env -C .next/standalone .

      - name: Upload via WebDAV + trigger deploy
        env:
          URL:  ${{ secrets.WEBDISK_URL }}
          USER: ${{ secrets.WEBDISK_USER }}
          PASS: ${{ secrets.WEBDISK_PASS }}
        run: |
          set -euo pipefail
          dav() { curl -fsS -k -u "$USER:$PASS" "$@"; }
          # Ensure the .deploy drop folder exists (MKCOL is idempotent-ish; ignore if present)
          dav -X MKCOL "$URL/.deploy/" || true
          # Clear any stale trigger so the cron can't act on a half-finished upload
          dav -X DELETE "$URL/.deploy/ready" || true
          # 1) upload the build, 2) THEN the ready marker — its presence means the build is complete
          dav -T /tmp/build.tar.gz "$URL/.deploy/build.tar.gz"
          printf '%s\n' "$GITHUB_SHA" > /tmp/ready
          dav -T /tmp/ready "$URL/.deploy/ready"
          echo "✅ Uploaded. The cPanel cron will extract and restart within ~1 minute."
